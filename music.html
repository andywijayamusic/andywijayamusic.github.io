<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Andy Wijaya Music</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0b0b0b;
    color:#fff;
    text-align:center;
}

h1{
    margin:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background:#151515;
    padding:15px;
    border-radius:15px;
    width:300px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
    font-size:16px;
}

iframe{
    width:100%;
    height:120px;
    border:none;
}
</style>
</head>

<body>

<h1>🎵 Andy Wijaya Music</h1>

<div class="container" id="music"></div>

<script>
const rssUrl = "https://feeds.soundcloud.com/users/555085773/sounds.rss";

// pakai proxy biar gak ke-block
const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rssUrl);

fetch(proxy)
.then(res => res.text())
.then(str => new DOMParser().parseFromString(str, "text/xml"))
.then(data => {

    const container = document.getElementById("music");
    const items = data.querySelectorAll("item");

    if (!items.length) {
        container.innerHTML = "<p>RSS kosong / gagal load</p>";
        return;
    }

    items.forEach((item, i) => {
        if (i >= 6) return;

        const title = item.querySelector("title").textContent;
        const link = item.querySelector("link").textContent;

        let desc = item.querySelector("description").textContent;
        let imgMatch = desc.match(/img src="(.*?)"/);
        let img = imgMatch ? imgMatch[1] : "https://via.placeholder.com/300x300?text=No+Image";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${img}">
            <h3>${title}</h3>
            <iframe 
                src="https://w.soundcloud.com/player/?url=${link}&color=%23ff5500">
            </iframe>
        `;

        container.appendChild(card);
    });

})
.catch(err => {
    console.error(err);
    document.getElementById("music").innerHTML = "<p>Error load RSS</p>";
});
</script>

</body>
</html>
