<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Andy Wijaya Music</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0b0b0b;
    color:#fff;
    text-align:center;
}

h1{
    margin:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background:#151515;
    padding:15px;
    border-radius:15px;
    width:300px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
    font-size:16px;
}

iframe{
    width:100%;
    height:120px;
    border:none;
}
</style>
</head>

<body>

<h1>🎵 Andy Wijaya Music</h1>

<div class="container" id="music"></div>

<script>
const container = document.getElementById("music");

// list lagu manual dari SoundCloud lu
const tracks = [
    "https://soundcloud.com/andywijaya/track-1",
    "https://soundcloud.com/andywijaya/track-2",
    "https://soundcloud.com/andywijaya/track-3"
];

tracks.forEach(link => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <iframe 
            src="https://w.soundcloud.com/player/?url=${link}&color=%23ff5500">
        </iframe>
    `;

    container.appendChild(card);
});
</script>

</body>
</html>
