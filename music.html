<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Andy Wijaya Music</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0b0b0b;
    color:#fff;
    text-align:center;
}

h1{
    margin:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background:#151515;
    padding:15px;
    border-radius:15px;
    width:300px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
    font-size:16px;
}

iframe{
    width:100%;
    height:120px;
    border:none;
}
</style>
</head>

<body>

<h1>🎵 Andy Wijaya Music</h1>

<div class="container" id="music"></div>

<script>
const rssUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.soundcloud.com/users/555085773/sounds.rss";

fetch(rssUrl)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("music");

    // DEBUG
    console.log(data);

    if (!data.items || data.items.length === 0) {
        container.innerHTML = "<p>Gagal load RSS / kosong</p>";
        return;
    }

    data.items.slice(0,6).forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        let img = item.thumbnail || "https://via.placeholder.com/300x300?text=No+Image";
        let link = item.link;

        card.innerHTML = `
            <img src="${img}">
            <h3>${item.title}</h3>
            <iframe 
                src="https://w.soundcloud.com/player/?url=${link}&color=%23ff5500">
            </iframe>
        `;

        container.appendChild(card);
    });

})
.catch(err => {
    console.error(err);
    document.getElementById("music").innerHTML = "<p>Error ambil data RSS</p>";
});
</script>

</body>
</html>
