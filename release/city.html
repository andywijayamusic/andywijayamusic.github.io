<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andy Wijaya - City</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#080808;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

/* Background Glow */

.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.bg span{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
animation:move 20s infinite alternate;
}

.bg span:nth-child(1){
background:#1db954;
top:20%;
left:10%;
}

.bg span:nth-child(2){
background:#ff004c;
bottom:10%;
right:20%;
animation-delay:5s;
}

.bg span:nth-child(3){
background:#0066ff;
top:60%;
left:50%;
animation-delay:10s;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(200px,-150px);}
}

/* Container */

.container{
width:90%;
max-width:420px;
text-align:center;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* Cover */

.cover{
width:180px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 0 30px rgba(255,255,255,0.15);
}

/* Text */

.artist{
opacity:.6;
font-size:14px;
}

.title{
font-size:28px;
margin-bottom:20px;
}

/* Button */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:14px;
margin:10px 0;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:600;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
transition:.3s;
backdrop-filter:blur(10px);
}

.btn svg{
width:22px;
height:22px;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* Hover Color */

.spotify:hover{background:#1db954;}
.apple:hover{background:#fa243c;}
.youtube:hover{background:#ff0000;}
.amazon:hover{background:#2a2a72;}
.deezer:hover{background:#111;}
.tidal:hover{background:#000;}

.footer{
margin-top:20px;
font-size:12px;
opacity:.4;
}

</style>

</head>

<body>

<div class="bg">
<span></span>
<span></span>
<span></span>
</div>

<div class="container">

<img src="cover.jpg" class="cover">

<div class="artist">Andy Wijaya</div>
<div class="title">City</div>
