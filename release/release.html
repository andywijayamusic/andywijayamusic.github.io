<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Andy Wijaya | Pre-save Page</title>

  <link rel="icon" href="img/awicon.png" type="image/png">
  <meta name="theme-color" content="#000000">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --btn-bg:#111827;
      --btn-hover:#1e293b;
      --glow:#00d9ff;
      --text:#fff;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      min-height:100vh;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top,#111827 0%,#000 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:conic-gradient(from 0deg,#00d9ff33,#111827,#00d9ff33,#000);
      animation:spin 20s linear infinite;
      filter:blur(120px);
      z-index:-1;
    }

    @keyframes spin{
      0%{transform:rotate(0deg);}
      100%{transform:rotate(360deg);}
    }

    /* 🔥 OUTER BOX / CARD */
    .card{
      width:100%;
      max-width:420px;
      background:rgba(17,24,39,0.55);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      box-shadow:0 0 25px rgba(0,217,255,0.08);
      padding:22px;
      backdrop-filter:blur(10px);

      display:flex;
      flex-direction:column;
      gap:18px;
    }

    /* ARTWORK */
    .artwork-frame{
      width:140px;
      height:140px;
      border-radius:18px;
      padding:6px;
      background:rgba(0,0,0,0.35);
      border:1px solid rgba(0,217,255,0.35);
      box-shadow:0 0 18px rgba(0,217,255,0.2);
      margin:0 auto;
    }

    .artwork-frame img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:12px;
      transform:scale(1.08);
    }

    h1{
      font-size:22px;
      font-weight:800;
      text-align:center;
    }

    .sub{
      font-size:13px;
      opacity:0.7;
      text-align:center;
      margin-top:4px;
    }

    /* SECTION */
    .section{
      text-align:center;
    }

    .section h2{
      font-size:11px;
      letter-spacing:2px;
      opacity:0.5;
      margin-bottom:10px;
    }

    /* BUTTONS */
    .buttons{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;

      padding:10px 14px;
      font-size:13px;
      font-weight:600;

      background:var(--btn-bg);
      color:var(--text);
      text-decoration:none;

      border-radius:10px;
      border:1px solid rgba(255,255,255,0.05);

      transition:.2s;
    }

    .btn:hover{
      background:var(--btn-hover);
      box-shadow:0 0 12px var(--glow);
      transform:translateY(-2px);
    }

    .btn i{
      font-size:16px;
      color:var(--glow);
    }

    /* FOOTER */
    footer{
      text-align:center;
      font-size:11px;
      opacity:0.6;
      margin-top:6px;
    }

    .social{
      display:flex;
      justify-content:center;
      gap:14px;
      margin-top:10px;
    }

    .social a{
      color:rgba(255,255,255,0.6);
      font-size:17px;
      transition:.2s;
    }

    .social a:hover{
      color:var(--glow);
      transform:scale(1.2);
    }
  </style>
</head>

<body>

<!-- 🔥 MAIN CARD BOX -->
<div class="card">

  <!-- ARTWORK -->
  <div>
    <div class="artwork-frame">
      <img src="img/release.jpg" alt="Artwork"
      onerror="this.src='https://via.placeholder.com/400x400?text=Artwork'">
    </div>

    <h1>Andy Wijaya</h1>
    <div class="sub">City ( Official Audio )</div>
  </div>

  <!-- MUSIC -->
  <div class="section">
    <h2>Music Store</h2>

    <div class="buttons">
      <a class="btn" href="#"><i class="fab fa-spotify"></i>Spotify</a>
      <a class="btn" href="#"><i class="fab fa-apple"></i>Apple Music</a>
      <a class="btn" href="#"><i class="fas fa-wave-square"></i>Deezer</a>
      <a class="btn" href="#"><i class="fab fa-youtube"></i>YouTube Music</a>
      <a class="btn" href="#"><i class="fab fa-soundcloud"></i>SoundCloud</a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    Cieeeeee liat doang, dengarin dong - © 2026 AWMusic

    <div class="social">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
    </div>
  </footer>

</div>

</body>
</html>
